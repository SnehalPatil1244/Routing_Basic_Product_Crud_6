<div class="main-auth">
    <div class="card" style=" width:350px;">
        <div class="card-body">
            <ng-container *ngIf="isAllReadyHAsAccount">
                <h2 class="text-primary">Log In</h2>
                <form [formGroup]="LoginForm" (ngSubmit)="onlogin()">
                    <div class="form-group">
                        <label for="email" class="text-primary">Email*</label>
                        <input type="text" formControlName="email" class="form-control">
                        <small *ngIf="l['email'].touched && l['email'].hasError('required')">Email Has Requried
                            Field...</small>
                    </div>
                    <div class="form-group">
                        <label for="password" class="text-primary">Password*</label>
                        <input type="text" formControlName="password" class="form-control">
                        <small *ngIf="l['password'].touched && l['password'].hasError('required')">password Has Requried
                            Field...</small>
                    </div>
                    <button class="w-100 mb-2" mat-raised-button color="primary">Log In</button>
                    <a (click)="isAllReadyHAsAccount = false" href="javascript:;">Don't Have Account</a>
                </form>
            </ng-container>
            <ng-container *ngIf="!isAllReadyHAsAccount">
                <h2 class="text-primary">Sing Up</h2>
                <form [formGroup]="SignUpForm" (ngSubmit)="onsignup()">
                    <div class="form-group">
                        <label for="email">Email*</label>
                        <input type="text" formControlName="email" class="form-control">
                        <small *ngIf="s['email'].touched && s['email'].hasError('required')">email Has Requried
                            Field...</small>
                    </div>
                    <div class="form-group">
                        <label for="password">Password*</label>
                        <input type="text" formControlName="password" class="form-control">
                        <small *ngIf="s['password'].touched && s['password'].hasError('required')">password Has Requried
                            Field...</small>
                    </div>
                    <div class="form-group">
                        <label for="userRole">User Role*</label>
                        <select type="text" formControlName="userRole" class="form-control">
                            <option value="buyer">Buyer</option>
                            <option value="admin">Admin</option>
                            <option value="superAdmin">SuperAdmin</option>
                        </select>
                        <small *ngIf="s['userRole'].touched && s['userRole'].hasError('required')">userRole Has Requried
                            Field...</small>
                    </div>
                    <button class="w-100 mb-2" mat-raised-button color="primary">Sign Up</button>
                    <a (click)="isAllReadyHAsAccount = true" href="javascript:;">Already Has An Account</a>
                </form>
            </ng-container>
        </div>
    </div>
</div>
