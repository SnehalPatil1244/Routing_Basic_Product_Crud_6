<div class="container-fluid">
    <nav class="navbar-custom px-3">
        <div class="col-md-4">
            <a class="navbar-brand fw-bold fs-3" routerLink="home">
                NavBar
            </a>
        </div>
        <div class="col-md-8">
            <ul class="navbar-menu">
                <li class="mr-3"><a routerLink="home" [class.active-link]="router.url === '/home'">Home</a></li>
                <li class="mr-3"><a (click)="ongouser()" [class.active-link]="router.url.startsWith('/users')">Users</a>
                </li>
                <li class="mr-3"><a (click)="ongoproducts()"
                        [class.active-link]="router.url.startsWith('/products')">Products</a></li>
                <li class="mr-5"><a (click)="ongofairs()"
                        [class.active-link]="router.url.startsWith('/fairs')">Fairs</a></li>
                <strong class="text-black badge-warning p-2">{{userRole}}</strong>
                <button class="ml-3" mat-raised-button color="warn" (click)="logout()">LogOut</button>
            </ul>
        </div>
    </nav>
</div>
